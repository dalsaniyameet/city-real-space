<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – City Real Space</title>
  <link rel="icon" type="image/jpeg" href="../images/logo.jpeg"/>
  <link rel="apple-touch-icon" href="../images/logo.jpeg"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    @keyframes fadeInUp  { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    @keyframes scaleIn   { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
    @keyframes floatLogo { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-12px) rotate(2deg)} }
    @keyframes pulse2    { 0%,100%{box-shadow:0 0 0 0 rgba(21,101,192,0.6)} 70%{box-shadow:0 0 0 20px rgba(21,101,192,0)} }
    @keyframes orb1      { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(30px,-25px) scale(1.15)} }
    @keyframes orb2      { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-25px,30px) scale(0.88)} }
    @keyframes orb3      { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,20px)} }
    @keyframes shimmerBg { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @keyframes badgePop  { 0%{opacity:0;transform:scale(0.5) translateY(-10px)} 100%{opacity:1;transform:scale(1) translateY(0)} }

    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Poppins',sans-serif;
      background:linear-gradient(135deg,#020c1b 0%,#0a1628 40%,#0d2040 70%,#020c1b 100%);
      background-size:400% 400%;
      animation:shimmerBg 12s ease infinite;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      position:relative;overflow:hidden;
    }
    /* Background orbs */
    body::before { content:''; position:fixed; width:500px;height:500px; border-radius:50%; background:radial-gradient(circle,rgba(21,101,192,0.15),transparent 70%); top:-100px;right:-100px; animation:orb1 10s ease-in-out infinite; pointer-events:none; }
    body::after  { content:''; position:fixed; width:400px;height:400px; border-radius:50%; background:radial-gradient(circle,rgba(229,57,53,0.08),transparent 70%); bottom:-80px;left:-80px; animation:orb2 13s ease-in-out infinite; pointer-events:none; }

    .box{
      background:rgba(255,255,255,0.97);
      border-radius:24px;padding:48px 40px;width:100%;max-width:440px;
      box-shadow:0 40px 100px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
      animation:scaleIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
      position:relative;overflow:hidden;
    }
    .box::before { content:''; position:absolute; top:0;left:0;right:0;height:4px; background:linear-gradient(90deg,#1565c0,#42a5f5,#1565c0); background-size:200% 100%; animation:shimmerBg 3s linear infinite; }

    /* Admin badge */
    .admin-badge {
      display:inline-flex;align-items:center;gap:6px;
      background:linear-gradient(135deg,#1565c0,#0d47a1);
      color:#fff;font-size:0.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
      padding:4px 14px;border-radius:50px;margin-bottom:20px;
      animation:badgePop 0.6s 0.3s cubic-bezier(0.175,0.885,0.32,1.275) both;
      box-shadow:0 4px 14px rgba(21,101,192,0.4);
    }

    .logo{text-align:center;margin-bottom:28px;animation:fadeInUp 0.6s 0.1s both;display:flex;flex-direction:column;align-items:center;}
    .logo-img-wrap {
      display:inline-block;margin-bottom:14px;
      animation:floatLogo 4s ease-in-out infinite, pulse2 2.5s 0.8s infinite;
    }
    .logo img{height:72px;width:72px;object-fit:contain;border-radius:18px;background:#fff;padding:6px;box-shadow:0 8px 28px rgba(0,0,0,0.2);display:block;}
    .logo h2{font-size:1.4rem;font-weight:800;color:#0D1B2A;margin-bottom:3px;}
    .logo p{font-size:0.8rem;color:#888;}

    .grp{margin-bottom:16px;animation:fadeInUp 0.5s both;}
    .grp:nth-child(1){animation-delay:0.25s} .grp:nth-child(2){animation-delay:0.35s}
    .grp label{display:block;font-size:0.8rem;font-weight:600;color:#555;margin-bottom:6px;}
    .inp{display:flex;align-items:center;gap:10px;border:1.5px solid #e8e8e8;border-radius:10px;padding:12px 14px;transition:all 0.25s;}
    .inp:focus-within{border-color:#1565c0;box-shadow:0 0 0 3px rgba(21,101,192,0.12);transform:translateY(-1px);}
    .inp i{color:#1565c0;font-size:0.85rem;flex-shrink:0;}
    .inp input{flex:1;border:none;outline:none;font-size:0.88rem;color:#333;font-family:'Poppins',sans-serif;}

    .btn{width:100%;background:linear-gradient(135deg,#1565c0,#0d47a1);color:#fff;border:none;padding:14px;border-radius:10px;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;box-shadow:0 4px 16px rgba(21,101,192,0.35);animation:fadeInUp 0.5s 0.45s both;}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(21,101,192,0.5);}
    .btn:active{transform:translateY(0);}
    .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

    .err{background:#fff5f5;border:1px solid #ffcdd2;color:#c62828;padding:10px 14px;border-radius:8px;font-size:0.82rem;margin-bottom:16px;display:none;align-items:center;gap:8px;}
    .back{text-align:center;margin-top:20px;font-size:0.82rem;color:#888;animation:fadeInUp 0.5s 0.55s both;}
    .back a{color:#1565c0;font-weight:600;text-decoration:none;}
    .hidden{display:none!important;}

    /* OTP boxes */
    .otp-boxes{display:flex;gap:10px;justify-content:center;margin:20px 0;}
    .otp-boxes input{width:46px;height:52px;border:1.5px solid #e8e8e8;border-radius:10px;text-align:center;font-size:1.4rem;font-weight:700;color:#0D1B2A;font-family:'Poppins',sans-serif;outline:none;transition:all 0.2s;}
    .otp-boxes input:focus{border-color:#1565c0;box-shadow:0 0 0 3px rgba(21,101,192,0.12);background:#eff6ff;}
    .otp-info{text-align:center;font-size:0.82rem;color:#888;margin-bottom:8px;}
    .otp-info strong{color:#0D1B2A;}
    .resend-row{text-align:center;margin-top:12px;font-size:0.8rem;color:#aaa;}
    .resend-row button{background:none;border:none;color:#1565c0;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;font-size:0.8rem;}
  </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-img-wrap">
      <img src="../images/logo.jpeg" alt="City Real Space"/>
    </div>
    <h2>Admin Panel</h2>
    <p>City Real Space — Secure Access</p>
    <div class="admin-badge"><i class="fa-solid fa-shield-halved"></i> Admin Access Only</div>
  </div>

  <div class="err" id="errMsg"><i class="fa-solid fa-circle-exclamation"></i> <span id="errText"></span></div>

  <!-- STEP 1: Email + Password -->
  <form id="loginForm">
    <div class="grp">
      <label>Email Address</label>
      <div class="inp"><i class="fa-solid fa-envelope"></i><input type="email" id="adminEmail" placeholder="Enter your email" required/></div>
    </div>
    <div class="grp">
      <label>Password</label>
      <div class="inp"><i class="fa-solid fa-lock"></i><input type="password" id="pass" placeholder="Password" required/></div>
    </div>
    <button type="submit" class="btn" id="loginBtn"><i class="fa-solid fa-right-to-bracket"></i> Login to Admin Panel</button>
  </form>

  <!-- STEP 2: OTP -->
  <div id="otpStep" class="hidden">
    <div class="otp-info">OTP sent to <strong id="otpEmailShow"></strong></div>
    <div class="otp-boxes">
      <input type="text" maxlength="1" class="otp-digit" id="o1"/>
      <input type="text" maxlength="1" class="otp-digit" id="o2"/>
      <input type="text" maxlength="1" class="otp-digit" id="o3"/>
      <input type="text" maxlength="1" class="otp-digit" id="o4"/>
      <input type="text" maxlength="1" class="otp-digit" id="o5"/>
      <input type="text" maxlength="1" class="otp-digit" id="o6"/>
    </div>
    <button class="btn" id="otpVerifyBtn" onclick="verifyOTP()"><i class="fa-solid fa-shield-halved"></i> Verify & Enter Panel</button>
    <div class="resend-row">Didn't receive? <button onclick="resendOTP()">Resend OTP</button></div>
  </div>

  <div class="back"><a href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to Website</a></div>
</div>

<script>
const API = (function() {
  if (window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
    return 'http://localhost:5000/api';
  }
  return 'https://city-real-space.vercel.app/api';
})();
let _adminEmail = '';

console.log('🔒 Admin Panel - API Endpoint:', API);

// OTP box auto-jump
document.querySelectorAll('.otp-digit').forEach((inp, i, arr) => {
  inp.addEventListener('input', () => {
    inp.value = inp.value.replace(/\D/g, '');
    if (inp.value && i < arr.length - 1) arr[i + 1].focus();
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !inp.value && i > 0) arr[i - 1].focus();
  });
});

function showErr(msg) {
  document.getElementById('errText').textContent = msg;
  document.getElementById('errMsg').style.display = 'flex';
}
function hideErr() { document.getElementById('errMsg').style.display = 'none'; }

const OTP_VALID_MS = 24 * 60 * 60 * 1000; // 24 hours

function isOtpSessionValid(email) {
  const saved = localStorage.getItem('adminOtpVerified_' + email);
  return saved && (Date.now() - parseInt(saved)) < OTP_VALID_MS;
}

// STEP 1 — Login
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  hideErr();
  const btn = document.getElementById('loginBtn');
  const email = document.getElementById('adminEmail').value.trim();
  const password = document.getElementById('pass').value;
  
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verifying...';
  btn.disabled = true;
  
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    
    if (data.success && data.needsOTP) {
      if (!data.isAdmin) {
        showErr('Access denied. Admin only.');
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login to Admin Panel';
        btn.disabled = false;
        return;
      }
      _adminEmail = data.email;

      // ✅ OTP already verified within 24 hours — skip OTP, go directly
      if (isOtpSessionValid(_adminEmail)) {
        // Re-fetch token by doing a silent OTP-bypass verify
        // We need a valid token — request backend with stored session
        // Since backend requires OTP, we store token from last OTP verify
        const storedToken = localStorage.getItem('adminOtpToken_' + _adminEmail);
        const storedUser  = localStorage.getItem('adminOtpUser_'  + _adminEmail);
        if (storedToken && storedUser) {
          localStorage.setItem('adminToken', storedToken);
          localStorage.setItem('adminUser',  storedUser);
          localStorage.setItem('adminLastActive', Date.now().toString());
          window.location.href = 'index.html';
          return;
        }
      }

      // OTP session expired or not found — show OTP step
      document.getElementById('otpEmailShow').textContent = _adminEmail;
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('otpStep').classList.remove('hidden');
      document.getElementById('o1').focus();
    } else if (data.success && !data.needsOTP) {
      showErr('Access denied. Admin only.');
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login to Admin Panel';
      btn.disabled = false;
    } else {
      showErr(data.message || 'Invalid credentials');
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login to Admin Panel';
      btn.disabled = false;
    }
  } catch(err) {
    showErr('Server error. Make sure backend is running on ' + API);
    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login to Admin Panel';
    btn.disabled = false;
  }
});

// STEP 2 — Verify OTP
async function verifyOTP() {
  hideErr();
  const otp = ['o1','o2','o3','o4','o5','o6'].map(id => document.getElementById(id).value).join('');
  if (otp.length < 6) { showErr('Enter complete 6-digit OTP'); return; }
  
  const btn = document.getElementById('otpVerifyBtn');
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verifying...';
  btn.disabled = true;
  
  try {
    console.log('🔑 Admin OTP verify request:', { email: _adminEmail, otp });
    const res = await fetch(API + '/auth/verify-login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email: _adminEmail, otp })
    });
    const data = await res.json();
    console.log('📨 Verify response:', data);
    
    if (data.success && data.user && data.user.role === 'admin') {
      localStorage.setItem('adminToken', data.token);
      localStorage.setItem('adminUser', JSON.stringify(data.user));
      localStorage.setItem('adminLastActive', Date.now().toString());
      // Save OTP session for 24 hours
      localStorage.setItem('adminOtpVerified_' + _adminEmail, Date.now().toString());
      localStorage.setItem('adminOtpToken_'    + _adminEmail, data.token);
      localStorage.setItem('adminOtpUser_'     + _adminEmail, JSON.stringify(data.user));
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'index.html';
    } else if (data.success && data.user && data.user.role !== 'admin') {
      console.error('❌ User is not admin');
      showErr('Access denied. Admin only.');
      btn.innerHTML = '<i class="fa-solid fa-shield-halved"></i> Verify & Enter Panel';
      btn.disabled = false;
    } else {
      console.error('❌ OTP verification failed:', data.message);
      showErr(data.message || 'Invalid OTP');
      btn.innerHTML = '<i class="fa-solid fa-shield-halved"></i> Verify & Enter Panel';
      btn.disabled = false;
    }
  } catch(err) {
    console.error('🚨 OTP verify error:', err);
    showErr('Server error.');
    btn.innerHTML = '<i class="fa-solid fa-shield-halved"></i> Verify & Enter Panel';
    btn.disabled = false;
  }
}

// Resend OTP
async function resendOTP() {
  if (!_adminEmail) return;
  try {
    console.log('🔄 Resending OTP for:', _adminEmail);
    const res = await fetch(API + '/auth/resend-otp', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email: _adminEmail })
    });
    const data = await res.json();
    console.log('📨 Resend response:', data);
    
    if (data.success) { 
      console.log('✅ OTP resent');
      hideErr();
      ['o1','o2','o3','o4','o5','o6'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('o1').focus();
    }
    else {
      console.error('❌ Resend failed:', data.message);
      showErr(data.message || 'Error resending OTP');
    }
  } catch(err) {
    console.error('🚨 Resend error:', err);
    showErr('Server error.');
  }
}
</script>

</body>
</html>
