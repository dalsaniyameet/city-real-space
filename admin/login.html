<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – City Real Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#0D1B2A 0%,#1a3a5c 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .box{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,0.35);}
    .logo{text-align:center;margin-bottom:32px;}
    .logo img{height:56px;width:auto;object-fit:contain;margin-bottom:12px;}
    .logo h2{font-size:1.4rem;font-weight:800;color:#0D1B2A;}
    .logo p{font-size:0.82rem;color:#888;margin-top:4px;}
    .grp{margin-bottom:18px;}
    .grp label{display:block;font-size:0.8rem;font-weight:600;color:#555;margin-bottom:6px;}
    .inp{display:flex;align-items:center;gap:10px;border:1.5px solid #e8e8e8;border-radius:10px;padding:12px 14px;transition:border-color 0.2s;}
    .inp:focus-within{border-color:#E53935;box-shadow:0 0 0 3px rgba(229,57,53,0.1);}
    .inp i{color:#E53935;font-size:0.85rem;flex-shrink:0;}
    .inp input{flex:1;border:none;outline:none;font-size:0.88rem;color:#333;font-family:'Poppins',sans-serif;}
    .btn{width:100%;background:#E53935;color:#fff;border:none;padding:14px;border-radius:10px;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
    .btn:hover{background:#c62828;transform:translateY(-1px);}
    .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
    .err{background:#fff5f5;border:1px solid #ffcdd2;color:#c62828;padding:10px 14px;border-radius:8px;font-size:0.82rem;margin-bottom:16px;display:none;align-items:center;gap:8px;}
    .back{text-align:center;margin-top:20px;font-size:0.82rem;color:#888;}
    .back a{color:#E53935;font-weight:600;text-decoration:none;}
    .hidden{display:none!important;}
    /* OTP boxes */
    .otp-boxes{display:flex;gap:10px;justify-content:center;margin:20px 0;}
    .otp-boxes input{width:46px;height:52px;border:1.5px solid #e8e8e8;border-radius:10px;text-align:center;font-size:1.4rem;font-weight:700;color:#0D1B2A;font-family:'Poppins',sans-serif;outline:none;transition:all 0.2s;}
    .otp-boxes input:focus{border-color:#E53935;box-shadow:0 0 0 3px rgba(229,57,53,0.1);}
    .otp-info{text-align:center;font-size:0.82rem;color:#888;margin-bottom:8px;}
    .otp-info strong{color:#0D1B2A;}
    .resend-row{text-align:center;margin-top:12px;font-size:0.8rem;color:#aaa;}
    .resend-row button{background:none;border:none;color:#E53935;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;font-size:0.8rem;}
  </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <img src="../images/logo.jpeg" alt="City Real Space"/>
    <h2>Admin Panel</h2>
    <p>City Real Space — Secure Access</p>
  </div>

  <div class="err" id="errMsg"><i class="fa-solid fa-circle-exclamation"></i> <span id="errText"></span></div>

  <!-- STEP 1: Email + Password -->
  <form id="loginForm">
    <div class="grp">
      <label>Email Address</label>
      <div class="inp"><i class="fa-solid fa-envelope"></i><input type="email" id="adminEmail" placeholder="admin@cityestate.co.in" required/></div>
    </div>
    <div class="grp">
      <label>Password</label>
      <div class="inp"><i class="fa-solid fa-lock"></i><input type="password" id="pass" placeholder="Password" required/></div>
    </div>
    <button type="submit" class="btn" id="loginBtn"><i class="fa-solid fa-right-to-bracket"></i> Login to Admin Panel</button>
  </form>

  <!-- STEP 2: OTP -->
  <div id="otpStep" class="hidden">
    <div class="otp-info">OTP sent to <strong id="otpEmailShow"></strong></div>
    <div class="otp-boxes">
      <input type="text" maxlength="1" class="otp-digit" id="o1"/>
      <input type="text" maxlength="1" class="otp-digit" id="o2"/>
      <input type="text" maxlength="1" class="otp-digit" id="o3"/>
      <input type="text" maxlength="1" class="otp-digit" id="o4"/>
      <input type="text" maxlength="1" class="otp-digit" id="o5"/>
      <input type="text" maxlength="1" class="otp-digit" id="o6"/>
    </div>
    <button class="btn" id="otpVerifyBtn" onclick="verifyOTP()"><i class="fa-solid fa-shield-halved"></i> Verify & Enter Panel</button>
    <div class="resend-row">Didn't receive? <button onclick="resendOTP()">Resend OTP</button></div>
  </div>

  <div class="back"><a href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to Website</a></div>
</div>

<script>
const API = 'http://localhost:5000/api';
let _adminEmail = '';

// OTP box auto-jump
document.querySelectorAll('.otp-digit').forEach((inp, i, arr) => {
  inp.addEventListener('input', () => {
    inp.value = inp.value.replace(/\D/g, '');
    if (inp.value && i < arr.length - 1) arr[i + 1].focus();
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !inp.value && i > 0) arr[i - 1].focus();
  });
});

function showErr(msg) {
  document.getElementById('errText').textContent = msg;
  document.getElementById('errMsg').style.display = 'flex';
}
function hideErr() { document.getElementById('errMsg').style.display = 'none'; }

// STEP 1 — Login
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  hideErr();
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verifying...';
  btn.disabled = true;
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email: document.getElementById('adminEmail').value, password: document.getElementById('pass').value })
    });
    const data = await res.json();
    if (data.success && data.needsOTP) {
      _adminEmail = data.email;
      document.getElementById('otpEmailShow').textContent = _adminEmail;
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('otpStep').classList.remove('hidden');
      document.getElementById('o1').focus();
    } else if (data.success && !data.needsOTP) {
      // Non-admin user ne admin panel login try kiya
      showErr('Access denied. Sirf Admin is panel mein login kar sakta hai.');
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login to Admin Panel';
      btn.disabled = false;
    } else {
      showErr(data.message || 'Invalid credentials');
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login to Admin Panel';
      btn.disabled = false;
    }
  } catch(err) {
    showErr('Server error. Make sure backend is running on port 5000.');
    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login to Admin Panel';
    btn.disabled = false;
  }
});

// STEP 2 — Verify OTP
async function verifyOTP() {
  hideErr();
  const otp = ['o1','o2','o3','o4','o5','o6'].map(id => document.getElementById(id).value).join('');
  if (otp.length < 6) { showErr('Enter complete 6-digit OTP'); return; }
  const btn = document.getElementById('otpVerifyBtn');
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verifying...';
  btn.disabled = true;
  try {
    const res = await fetch(API + '/auth/verify-login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email: _adminEmail, otp })
    });
    const data = await res.json();
    if (data.success && data.user.role === 'admin') {
      localStorage.setItem('adminToken', data.token);
      localStorage.setItem('adminUser', JSON.stringify(data.user));
      localStorage.setItem('adminLastActive', Date.now().toString());
      // Main site ka token clear karo taaki conflict na ho
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'index.html';
    } else if (data.success && data.user.role !== 'admin') {
      showErr('Access denied. Aap admin nahi hain.');
      btn.innerHTML = '<i class="fa-solid fa-shield-halved"></i> Verify & Enter Panel';
      btn.disabled = false;
    } else {
      showErr(data.message || 'Invalid OTP');
      btn.innerHTML = '<i class="fa-solid fa-shield-halved"></i> Verify & Enter Panel';
      btn.disabled = false;
    }
  } catch(err) {
    showErr('Server error.');
    btn.innerHTML = '<i class="fa-solid fa-shield-halved"></i> Verify & Enter Panel';
    btn.disabled = false;
  }
}

// Resend OTP
async function resendOTP() {
  if (!_adminEmail) return;
  try {
    const res = await fetch(API + '/auth/resend-otp', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email: _adminEmail })
    });
    const data = await res.json();
    if (data.success) { hideErr(); ['o1','o2','o3','o4','o5','o6'].forEach(id => document.getElementById(id).value = ''); document.getElementById('o1').focus(); }
    else showErr(data.message || 'Error resending OTP');
  } catch { showErr('Server error.'); }
}
</script>
</body>
</html>
